<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>多层次保障科普小工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="theme-light">
  <header class="hero" id="hero">
    <div class="container hero-inner">
      <div class="hero-copy">
        <h1 class="h1 hero-title" id="tool-title">多层次保障“科普小工具”</h1>
        <p class="hero-subtitle hero-lead" id="tool-subtitle">帮助患者与家属快速理解不同保障层级，并按需展开查看具体目录、政策与咨询入口。</p>
      </div>
      <div class="hero-actions">
        <button id="theme-toggle" class="button button-secondary" type="button" aria-label="切换明暗主题">
          <span class="icon" aria-hidden="true">◎</span>
          <span>切换主题</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container main">
    <div id="content-root" class="cards" aria-live="polite"></div>
  </main>

  <footer class="container footer">
    <div class="footer-note">提示：本页面为科普工具，具体政策以当地医保与产品条款为准。</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
