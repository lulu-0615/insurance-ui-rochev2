<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>多层次保障科普小工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="theme-light">
  <header class="hero" id="hero">
    <div class="container hero-inner">
      <div class="hero-copy">
        <div class="hero-top">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="hero-kicker">科普工具</span>
        </div>
        <h1 class="h1" id="tool-title">多层次保障科普小工具</h1>
        <p class="hero-subtitle" id="tool-subtitle">从居民医保 → 惠民保 → 商业险，帮你一步步看清自己的保障组合。</p>
      </div>
      <div class="hero-actions">
        <button id="theme-toggle" class="button button-secondary" type="button" aria-label="切换明暗主题">
          <span class="icon" aria-hidden="true">◎</span>
          <span>切换主题</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container main">
    <nav class="card toc" aria-label="模块导航">
      <div class="card-header">
        <div class="card-title">模块导航</div>
        <div class="card-desc">跳转到你想看的二级模块。</div>
      </div>
      <div id="category-toc" class="toc-list"></div>
    </nav>

    <div id="content-root" class="stack" aria-live="polite"></div>
  </main>

  <footer class="container footer">
    <div class="footer-note">提示：本页面为科普工具，具体政策以当地医保与产品条款为准。</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
